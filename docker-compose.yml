version: "3.9"

services:
  auth-service:
    build:
      context: .
      dockerfile: docker/auth-service/Dockerfile
    env_file:
      - .env.docker
    ports:
      - "8081:8080"

  rabbitmq-service:
    build:
      context: .
      dockerfile: docker/rabbitmq-service/Dockerfile
    env_file:
      - .env.docker
    ports:
      - "8082:8080"

  api-gateway:
    build:
      context: .
      dockerfile: docker/api-gateway/Dockerfile
    env_file:
      - .env.docker
    ports:
      - "8080:8080"
